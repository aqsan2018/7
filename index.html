<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Kiss Filler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💋</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  /* Midnight Orchid — unique palette for this site
     (preloader + lock + main all share it) */
  --space-0:  #08041a;
  --cyan:     #f0abfc;   /* orchid highlight */
  --cyan-2:   #d946ef;   /* fuchsia */
  --violet:   #4a0d5c;   /* deep plum */
  --pink:     #ff5cc8;   /* neon rose */
  --glass-bg:  rgba(255,255,255,0.06);
  --glass-brd: rgba(255,255,255,0.18);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.65);
  --grad-cta:  linear-gradient(135deg, #f0abfc 0%, #d946ef 55%, #4a0d5c 100%);
}

html, body {
  height: 100%;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  overscroll-behavior: none;
}
body {
  background:
    radial-gradient(1200px 800px at 20% 15%, rgba(217,70,239,0.28) 0%, transparent 55%),
    radial-gradient(1000px 700px at 85% 85%, rgba(240,171,252,0.20) 0%, transparent 55%),
    radial-gradient(900px 700px at 60% 45%, rgba(255,92,200,0.15) 0%, transparent 60%),
    linear-gradient(160deg, #08041a 0%, #1a0533 55%, #4a0d5c 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
}
* { box-sizing: border-box; }

#container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#instructions {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 2rem;
  color: #ffd6f2;
  text-shadow: 0 0 18px rgba(217,70,239,0.6);
  text-align: center;
  font-weight: 600;
  z-index: 400;
  pointer-events: none;
  user-select: none;
}
#final-message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  background: rgba(26, 5, 51, 0.55);
  border: 1px solid rgba(240,171,252,0.35);
  padding: clamp(1rem, 3vw, 2rem);
  border-radius: 1rem;
  backdrop-filter: blur(14px) saturate(150%);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: min(90vw, 600px);
  max-height: 70vh;
  overflow-y: auto;
  box-sizing: border-box;
}
#message-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 2vw + 0.5rem, 1.5rem);
  color: #ffe4f7;
  text-align: center;
  font-weight: 500;
  user-select: none;
  margin-bottom: 1.5rem;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
  text-shadow: 0 0 10px rgba(217,70,239,0.35);
}
#play-again-button {
  pointer-events: all;
  background: var(--grad-cta);
  color: white;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 0.75rem 1.75rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(217,70,239,0.45);
  transition: filter .2s ease, transform .15s ease;
}
#play-again-button:hover { filter: brightness(1.1); }
#play-again-button:active { transform: scale(.95); }

#click-counter {
  position: absolute;
  top: 18px;
  left: 18px;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.05rem;
  color: #f0abfc;
  text-shadow: 0 0 10px rgba(217,70,239,0.5);
  z-index: 400;
  user-select: none;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}

/* =====================================================
   PRELOADER — Cosmic heart (reused across sites)
   ===================================================== */
#loader {
  position: fixed; inset: 0; z-index: 1500;
  background:
    radial-gradient(1200px 700px at 20% 10%, rgba(217,70,239,0.35) 0%, transparent 60%),
    radial-gradient(900px 700px at 90% 90%, rgba(240,171,252,0.30) 0%, transparent 55%),
    radial-gradient(ellipse at center, #1a0533 0%, #08041a 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity .7s ease; overflow: hidden;
}
#loader .stage { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
.loader-heart {
  width: 86px; height: 86px;
  animation: beat 1.1s ease-in-out infinite;
  filter: drop-shadow(0 10px 24px rgba(255,92,200,0.55)) drop-shadow(0 0 30px rgba(240,171,252,0.35));
}
.loader-heart svg { width: 100%; height: 100%; display: block; }
@keyframes beat {
  0%,100% { transform: scale(1); }
  30% { transform: scale(1.22); }
  45% { transform: scale(.95); }
  65% { transform: scale(1.12); }
  80% { transform: scale(.98); }
}
#loader .petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
#loader .petal {
  position: absolute; bottom: -20px; width: 3px; height: 3px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 0 6px #fff, 0 0 12px #d946ef;
  opacity: .8; animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: .95; }
  100% { transform: translateY(-110vh); opacity: 0; }
}
#loader .msg {
  margin-top: 28px; font-family:'Playfair Display', serif; font-style: italic;
  color: #ffd6f2; letter-spacing: .06em; font-size: 18px;
  min-height: 26px; text-align: center;
  text-shadow: 0 0 12px rgba(217,70,239,.4);
  animation: msgFade .6s ease;
}
#loader .dots { display:inline-block; width: 22px; text-align:left; }
#loader .dots::after { content:''; animation: dots 1.4s steps(4, end) infinite; }
@keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} 100%{content:'';} }
@keyframes msgFade { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none;} }
#loader .hint {
  margin-top: 10px; font-size: 12px; color: #f0abfc;
  letter-spacing:.22em; text-transform: uppercase; opacity:.8;
  font-family: 'Orbitron', sans-serif;
}

/* =====================================================
   LOCK — Cosmic glassmorphic keypad (reused across sites)
   ===================================================== */
#password-overlay {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background:
    radial-gradient(1000px 600px at 20% 10%, rgba(217,70,239,0.35) 0%, transparent 60%),
    radial-gradient(800px 600px at 90% 90%, rgba(240,171,252,0.30) 0%, transparent 55%),
    rgba(8,4,26,0.75);
  backdrop-filter: blur(14px) saturate(140%);
  transition: opacity .5s ease;
}
#lock-box {
  width: 100%; max-width: 380px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-brd);
  border-radius: 24px;
  padding: 32px 28px 28px;
  backdrop-filter: blur(24px) saturate(160%);
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.15);
  text-align: center;
  animation: floatIn .7s cubic-bezier(.2,.9,.2,1.1) both;
  display: flex; flex-direction: column; align-items: center;
}
@keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: none; } }

.lock-icon {
  width: 84px; height: 84px; margin: 0 auto 14px;
  position: relative; display: grid; place-items: center;
  border-radius: 50%;
  background: var(--grad-cta);
  box-shadow: 0 12px 30px rgba(217,70,239,.45), inset 0 2px 0 rgba(255,255,255,.35);
  animation: lockEntry 1.1s cubic-bezier(.2,.9,.2,1.3) both, lockBreath 3.6s ease-in-out 1.1s infinite;
}
.lock-icon::before {
  content: ''; position: absolute; inset: -14px; border-radius: 50%;
  border: 2px solid rgba(240,171,252,.6);
  opacity: 0; animation: haloRing 2.8s ease-out 1.2s infinite;
  pointer-events: none;
}
.lock-icon svg { width: 42px; height: 42px; color: white; position: relative; z-index: 1; overflow: visible; }
.lock-icon .shackle {
  transition: transform .6s cubic-bezier(.5,-0.4,.3,1.6);
  transform-origin: 0% 100%;
  transform-box: fill-box;
  animation: shackleJiggle 4s ease-in-out 1.4s infinite;
}
.lock-icon.unlocked { animation: lockPop .8s cubic-bezier(.2,.9,.2,1.4) both; }
.lock-icon.unlocked .shackle { transform: rotate(-48deg) translate(0,-10px); animation: none; }
.lock-icon::after {
  content: ''; position: absolute; inset: -8px; border-radius: 50%;
  background: radial-gradient(closest-side, rgba(240,171,252,.7), transparent 70%);
  opacity: 0; transition: opacity .5s; pointer-events: none;
}
.lock-icon.unlocked::after { opacity: 1; animation: pulseGlow 1s ease-out; }
.lock-icon.wrong { animation: duduNo .55s cubic-bezier(.36,.07,.19,.97) both; }
.lock-icon.wrong svg { animation: gifPop .55s ease-out both; }
.lock-icon.wrong::after {
  opacity: 1;
  background: radial-gradient(closest-side, rgba(255,92,200,.8), transparent 70%);
  animation: pulseGlow .6s ease-out;
}
@keyframes duduNo {
  0%, 100% { transform: translateX(0) rotate(0); }
  15% { transform: translateX(-10px) rotate(-4deg); }
  30% { transform: translateX(10px)  rotate(4deg); }
  45% { transform: translateX(-8px)  rotate(-3deg); }
  60% { transform: translateX(8px)   rotate(3deg); }
  80% { transform: translateX(-3px)  rotate(-1deg); }
}
@keyframes gifPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.12); }
  70%  { transform: scale(.96); }
  100% { transform: scale(1); }
}
@keyframes pulseGlow { 0% { transform: scale(.9); opacity: .9; } 100% { transform: scale(1.8); opacity: 0; } }
@keyframes lockEntry {
  0%   { opacity: 0; transform: translateY(-30px) scale(.4) rotate(-18deg); }
  60%  { opacity: 1; transform: translateY(6px) scale(1.08) rotate(4deg); }
  80%  { transform: translateY(-2px) scale(.98) rotate(-2deg); }
  100% { opacity: 1; transform: none; }
}
@keyframes lockBreath {
  0%,100% { box-shadow: 0 12px 30px rgba(217,70,239,.45), inset 0 2px 0 rgba(255,255,255,.35); transform: scale(1); }
  50%     { box-shadow: 0 18px 44px rgba(240,171,252,.6), inset 0 2px 0 rgba(255,255,255,.5); transform: scale(1.04); }
}
@keyframes shackleJiggle {
  0%, 88%, 100% { transform: rotate(0) translateY(0); }
  92% { transform: rotate(-6deg) translateY(-1px); }
  96% { transform: rotate(5deg) translateY(-1px); }
}
@keyframes haloRing {
  0%   { opacity: .6; transform: scale(.85); }
  80%  { opacity: 0;   transform: scale(1.35); }
  100% { opacity: 0;   transform: scale(1.35); }
}
@keyframes lockPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.22) rotate(-6deg); }
  65%  { transform: scale(.94) rotate(3deg); }
  100% { transform: scale(1) rotate(0); }
}
#lock-box h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px; color: #ffd6f2; margin: 0 0 4px;
  letter-spacing: .05em;
  text-shadow: 0 0 12px rgba(217,70,239,.4);
}
#lock-box .sub {
  font-size: 13px; color: rgba(255,220,245,.65);
  margin: 0 0 18px;
  font-family: 'Inter', sans-serif;
}
#password-input {
  font-family: 'Orbitron', sans-serif;
  width: 100%; padding: 14px 16px;
  border-radius: 12px;
  border: 1.5px solid rgba(217,70,239,.35);
  background: rgba(10,4,26,.65);
  color: #fff;
  font-size: 1.25rem; text-align: center; letter-spacing: 8px;
  transition: all .25s ease;
  box-sizing: border-box;
}
#password-input:focus {
  outline: none; border-color: var(--cyan);
  background: rgba(10,4,26,.85);
  box-shadow: 0 0 0 4px rgba(240,171,252,.18);
}
.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; width: 100%; }
.key {
  padding: 14px 0; border-radius: 14px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.05);
  color: #ffd6f2;
  font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600;
  cursor: pointer; user-select: none;
  transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
  backdrop-filter: blur(8px);
  animation: keyIn .5s ease both;
}
.key:hover { background: rgba(217,70,239,.15); border-color: rgba(240,171,252,.5); }
.key:active { transform: scale(.92); box-shadow: 0 4px 12px rgba(217,70,239,.35); }
.key.action { background: var(--grad-cta); color: white; border: none; }
.key.action:hover { filter: brightness(1.1); }
.key.ghost { background: rgba(255,255,255,.03); }
@keyframes keyIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.keypad .key:nth-child(1){animation-delay:.05s}.keypad .key:nth-child(2){animation-delay:.09s}
.keypad .key:nth-child(3){animation-delay:.13s}.keypad .key:nth-child(4){animation-delay:.17s}
.keypad .key:nth-child(5){animation-delay:.21s}.keypad .key:nth-child(6){animation-delay:.25s}
.keypad .key:nth-child(7){animation-delay:.29s}.keypad .key:nth-child(8){animation-delay:.33s}
.keypad .key:nth-child(9){animation-delay:.37s}.keypad .key:nth-child(10){animation-delay:.41s}
.keypad .key:nth-child(11){animation-delay:.45s}.keypad .key:nth-child(12){animation-delay:.49s}
#submit-button { display: none; }
#error-message {
  color: #ff9be0;
  font-family: 'Inter', sans-serif;
  font-size: .88rem; height: 1.1rem; margin-top: 10px; font-weight: 500;
  text-shadow: 0 0 8px rgba(255,92,200,.3);
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.shake { animation: shake 0.3s ease-in-out; }
#wrong-gif {
  display: none;
  width: 150px; height: 150px;
  border-radius: 18px;
  margin: 12px auto 0;
  object-fit: cover;
  box-shadow: 0 12px 28px rgba(217,70,239,.25), 0 0 0 1px rgba(255,255,255,.18);
}
#wrong-gif.show { display: block; animation: floatIn .3s ease both; }
</style>
</head>

<body>

<!-- ============ COSMIC PRELOADER ============ -->
<div id="loader">
  <div class="petals" id="loaderPetals"></div>
  <div class="stage">
    <div class="loader-heart">
      <svg viewBox="0 0 24 24" fill="url(#heartGrad)" aria-hidden="true">
        <defs>
          <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0abfc"/>
            <stop offset="55%" stop-color="#d946ef"/>
            <stop offset="100%" stop-color="#4a0d5c"/>
          </linearGradient>
        </defs>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>

<!-- ============ COSMIC PASSWORD LOCK ============ -->
<div id="password-overlay">
  <form id="lock-box" autocomplete="off">
    <div class="lock-icon" id="lockIcon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path class="shackle" d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <rect x="4" y="11" width="16" height="10" rx="2"/>
      </svg>
    </div>
    <h3>Kiss Quest</h3>
    <p class="sub">Type the secret code 💕</p>

      <button type="button" class="key" data-k="1">1</button>
      <button type="button" class="key" data-k="2">2</button>
      <button type="button" class="key" data-k="3">3</button>
      <button type="button" class="key" data-k="4">4</button>

<div id="container">

    <p id="message-text"></p>
    <button id="play-again-button">Again</button>
  </div>
  <div id="click-counter">Kisses: 0</div>
</div>

<audio id="reveal-sound" src="reveal_ding.mp3" preload="auto"></audio>

<script>
/* ---------- Cosmic loader ---------- */
(function initLoader(){
  const petals = document.getElementById('loaderPetals');
  if (petals) {
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('span');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + '%';
      const dur = 6 + Math.random() * 8;
      p.style.animationDuration = dur + 's';
      p.style.animationDelay = (-Math.random() * dur) + 's';
      const size = 2 + Math.random() * 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.opacity = (.5 + Math.random() * .5).toFixed(2);
      petals.appendChild(p);
    }
  }
  const msgEl = document.getElementById('loaderMsg');
  const messages = [
    'Every kiss brings a little surprise closer',
    'Filling the air with kisses',
    'Almost ready for you'
  ];
  let mi = 0;
  const msgTimer = setInterval(() => {
    if (!msgEl) return;
    mi = (mi + 1) % messages.length;
    msgEl.style.animation = 'none';
    void msgEl.offsetWidth;
    msgEl.style.animation = '';
    msgEl.textContent = messages[mi];
  }, 1600);

  const dismiss = () => {
    clearInterval(msgTimer);
    const l = document.getElementById('loader');
    if (!l) return;
    l.style.opacity = '0';
    setTimeout(() => l.remove(), 700);
  };
  if (document.readyState === 'complete') setTimeout(dismiss, 1200);
  else window.addEventListener('load', () => setTimeout(dismiss, 1200));
  setTimeout(dismiss, 3500);
})();

document.addEventListener('DOMContentLoaded', () => {
  const { Engine, Render, Runner, World, Bodies, Events, Composite } = Matter;
  const container = document.getElementById('container');
  const instructions = document.getElementById('instructions');
  const finalMessage = document.getElementById('final-message');
  const messageText = document.getElementById('message-text');
  const playAgainButton = document.getElementById('play-again-button');
  const clickCounter = document.getElementById('click-counter');
  const revealSound = document.getElementById('reveal-sound');

  /* ---------- Cosmic Lock ---------- */
  const overlay = document.getElementById('password-overlay');
  const lockBox = document.getElementById('lock-box');
  const passInput = document.getElementById('password-input');
  const errorMsg = document.getElementById('error-message');
  const lockIcon = document.getElementById('lockIcon');
  const wrongGif = document.getElementById('wrong-gif');
  const correctPassword = "28072018";

  const STORAGE_PREFIX = 'kiss_seq_';
  let ownerKey = null;
  let gameInited = false;

  function hashString(s){
    let h=5381;
    for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i);
    return String(h>>>0);
  }

  function initOwnerKey(){
    return fetch('https://api.ipify.org?format=json')
      .then(r=>r.json()).then(d=>{
        const ip=d?.ip||'local';
        ownerKey=STORAGE_PREFIX+hashString(ip);
      }).catch(()=>{ownerKey=STORAGE_PREFIX+'local';});
  }

  function loadIndex(){try{return parseInt(localStorage.getItem(ownerKey+'_i'))||0;}catch{return 0;}}
  function saveIndex(i){try{localStorage.setItem(ownerKey+'_i',String(i));}catch{}}

  const messages = [
    "1. You know what I adore most about you?\nThe way your laugh feels like home.\nThe way your eyes calm my chaos.\nYou don't even try, and yet you mean everything.",
    "2. Sometimes I stop and just smile —\nbecause somehow you exist.\nYou're like a quiet miracle I get to know.\nAnd I never get used to that feeling.",
    "3. I swear, your presence is like soft sunlight.\nNot blinding, just warm enough to make the world okay again.\nHow do you do that so effortlessly?",
    "4. Every kiss feels like a small promise.\nA quiet way of saying, 'I'm here. I'm not going anywhere.'\nAnd that means more than you realize.",
    "5. You have this calm magic about you.\nEven when the world feels heavy,\nyou make it lighter — just by being near."
  ];

  function getNextMessage(){
    let i=loadIndex();
    const msg=messages[i];
    i=(i+1)%messages.length;
    saveIndex(i);
    return msg;
  }

  document.getElementById('keypad').addEventListener('click', (e) => {
    const k = e.target.closest('.key');
    if (!k) return;
    const v = k.dataset.k;
    if (!v) return;
    if (v === 'clear') passInput.value = passInput.value.slice(0, -1);
    else if (passInput.value.length < 8) passInput.value += v;
  });

  lockBox.addEventListener('submit', async (e)=>{
    e.preventDefault();
    if(passInput.value===correctPassword){
      if (wrongGif) wrongGif.classList.remove('show');
      lockIcon.classList.add('unlocked');
      await initOwnerKey();
      setTimeout(() => {
        overlay.style.opacity='0';
        setTimeout(()=>overlay.style.display='none',500);
        if (!gameInited) { gameInited = true; initGame(); }
      }, 600);
    } else {
      errorMsg.textContent='Wrong Password. Try Again!';
      lockBox.classList.add('shake');
      lockIcon.classList.add('wrong');
      if (wrongGif) {
        wrongGif.classList.remove('show');
        void wrongGif.offsetWidth;
        wrongGif.classList.add('show');
      }
      passInput.value = '';
      setTimeout(()=>{
        lockBox.classList.remove('shake');
        lockIcon.classList.remove('wrong');
      },600);
      setTimeout(()=>{
        errorMsg.textContent='';
        if (wrongGif) wrongGif.classList.remove('show');
      },2200);
    }
  });

  function initGame(){
    let worldWidth = document.documentElement.clientWidth;
    let worldHeight = document.documentElement.clientHeight;
    const emojiPx = 56, physicsRadius = emojiPx/2, clicksToReveal = 50;
    const emojiList = ['💋','❤️','😘'];

    const engine = Engine.create({gravity:{y:0.45}});
    const world = engine.world;
    const render = Render.create({
      element: container,
      engine,
      options: {
        width: worldWidth,
        height: worldHeight,
        wireframes: false,
        background: 'transparent'
      }
    });
    Render.run(render);
    Runner.run(Runner.create(), engine);

    const wallOpts = {isStatic:true, render:{visible:false}};
    World.add(world,[
      Bodies.rectangle(worldWidth/2,worldHeight+40,worldWidth+200,80,wallOpts),
      Bodies.rectangle(-40,worldHeight/2,80,worldHeight,wallOpts),
      Bodies.rectangle(worldWidth+40,worldHeight/2,80,worldHeight,wallOpts)
    ]);

    const imageCache=new Map(), bodyEmoji=new Map();
    function emojiToCodePoint(e){return Array.from(e).map(c=>c.codePointAt(0).toString(16)).join('-');}
    function loadEmojiPNG(e){
      if(imageCache.has(e))return;
      const code=emojiToCodePoint(e);
      const url=`https://twemoji.maxcdn.com/v/latest/72x72/${code}.png`;
      const img=new Image(); img.crossOrigin='anonymous';
      img.onload=()=>imageCache.set(e,img);
      img.onerror=()=>imageCache.set(e,null);
      img.src=url;
    }
    emojiList.forEach(loadEmojiPNG);

    Events.on(render,'afterRender',()=>{
      const ctx=render.context;
      bodyEmoji.forEach((emoji,id)=>{
        const b=world.bodies.find(bb=>bb.id===id);
        if(!b)return;
        ctx.save(); ctx.translate(b.position.x,b.position.y); ctx.rotate(b.angle);
        const img=imageCache.get(emoji);
        if(img){ctx.drawImage(img,-emojiPx/2,-emojiPx/2,emojiPx,emojiPx);}
        else{
          ctx.font=`${emojiPx}px "Segoe UI Emoji","Apple Color Emoji",sans-serif`;
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.fillText(emoji,0,0);
        }
        ctx.restore();
      });
    });

    const kissSounds=[new Audio('kiss1.mp3'),new Audio('kiss2.mp3')];
    kissSounds.forEach(s=>{s.preload='auto'; s.load();});
    let kissIndex=0, clickCount=0, messageRevealed=false;

    function addEmoji(x,y){
      if(messageRevealed)return;
      clickCount++;
      clickCounter.textContent=`Kisses: ${clickCount}`;
      const sound=kissSounds[kissIndex];
      try{sound.pause(); sound.currentTime=0; sound.play().catch(()=>{});}catch{}
      kissIndex=(kissIndex+1)%kissSounds.length;

      const emoji=emojiList[Math.floor(Math.random()*emojiList.length)];
      const body=Bodies.circle(x,y,physicsRadius,{restitution:0.6,friction:0.2,density:0.005});
      World.add(world,body);
      bodyEmoji.set(body.id,emoji);

      if(clickCount===1) instructions.style.opacity='0';
      if(clickCount>=clicksToReveal && !messageRevealed){
        messageRevealed=true;
        const msg=getNextMessage();
        messageText.textContent=msg;
        finalMessage.style.opacity='1';
        revealSound.currentTime=0; revealSound.play().catch(()=>{});
      }
    }

    function resetGame(){
      finalMessage.style.opacity='0';
      Composite.clear(world,false);
      bodyEmoji.clear();
      World.add(world,[
        Bodies.rectangle(worldWidth/2,worldHeight+40,worldWidth+200,80,wallOpts),
        Bodies.rectangle(-40,worldHeight/2,80,worldHeight,wallOpts),
        Bodies.rectangle(worldWidth+40,worldHeight/2,80,worldHeight,wallOpts)
      ]);
      clickCount=0; messageRevealed=false;
      clickCounter.textContent='Kisses: 0';
      instructions.style.opacity='1';
    }

    container.addEventListener('click', e => {
      const r=container.getBoundingClientRect();
      addEmoji(e.clientX-r.left,e.clientY-r.top);
    });

    playAgainButton.addEventListener('click', resetGame);

    window.addEventListener('resize', ()=>{
      worldWidth = document.documentElement.clientWidth;
      worldHeight = document.documentElement.clientHeight;
      render.canvas.width = worldWidth;
      render.canvas.height = worldHeight;
    });
  }
});
</script>
</body>
</html>
